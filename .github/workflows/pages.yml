name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_PAGES_PAT: ${{ secrets.PAGES_PAT != '' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Static Site
        run: python build_pages.py

      - name: Configure Pages With Auto Enable
        if: ${{ env.HAS_PAGES_PAT == 'true' }}
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_PAT }}
          enablement: true

      - name: Configure Pages
        if: ${{ env.HAS_PAGES_PAT != 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
