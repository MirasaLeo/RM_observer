<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoboMaster Live Observer</title>
    <style>
      :root {
        --bg: #07121d;
        --bg-soft: #0f2232;
        --panel: rgba(10, 24, 36, 0.84);
        --panel-strong: rgba(14, 32, 46, 0.96);
        --line: rgba(137, 186, 220, 0.18);
        --text: #edf7ff;
        --muted: #9cb6c7;
        --accent: #2fc0ff;
        --accent-strong: #0098ff;
        --warning: #ffd56a;
        --success: #51df8a;
        --danger: #ff6d78;
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
        --radius: 22px;
        --radius-sm: 14px;
        --font-sans:
          "IBM Plex Sans SC", "Noto Sans SC", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(0, 152, 255, 0.2), transparent 32%),
          radial-gradient(circle at top right, rgba(47, 192, 255, 0.16), transparent 26%),
          linear-gradient(180deg, #091521 0%, #07111a 100%);
        color: var(--text);
        font-family: var(--font-sans);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.75), transparent 92%);
      }

      a {
        color: inherit;
      }

      .page {
        width: min(1400px, calc(100% - 32px));
        margin: 28px auto 52px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background:
          linear-gradient(140deg, rgba(13, 34, 50, 0.94), rgba(6, 18, 28, 0.9)),
          linear-gradient(90deg, rgba(47, 192, 255, 0.1), transparent);
        box-shadow: var(--shadow);
      }

      .hero::after {
        content: "";
        position: absolute;
        right: -140px;
        top: -120px;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(47, 192, 255, 0.22), transparent 70%);
        filter: blur(8px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border: 1px solid rgba(47, 192, 255, 0.24);
        border-radius: 999px;
        color: var(--warning);
        background: rgba(8, 19, 30, 0.52);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 18px 0 12px;
        font-size: clamp(32px, 5vw, 54px);
        line-height: 1.04;
        letter-spacing: -0.03em;
      }

      .hero p {
        max-width: 880px;
        margin: 0;
        color: var(--muted);
        line-height: 1.72;
        font-size: 15px;
      }

      .source-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }

      .source-pill {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(137, 186, 220, 0.15);
        background: rgba(255, 255, 255, 0.04);
        color: #c7e8ff;
        font-size: 13px;
        text-decoration: none;
      }

      .status-bar {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .metric-card {
        padding: 16px 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }

      .metric-card .label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .metric-card .value {
        font-size: 20px;
        font-weight: 700;
      }

      .controls,
      .section {
        margin-top: 18px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .panel-selector {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .panel-selector p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .panel-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .panel-btn {
        min-height: 46px;
        padding: 0 18px;
        border: 1px solid rgba(137, 186, 220, 0.14);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        cursor: pointer;
        font: inherit;
      }

      .panel-btn.active {
        border-color: rgba(47, 192, 255, 0.3);
        background: rgba(47, 192, 255, 0.12);
        color: var(--text);
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field label {
        color: var(--muted);
        font-size: 13px;
      }

      .field select,
      .field button {
        min-height: 46px;
        padding: 0 14px;
        border: 1px solid rgba(137, 186, 220, 0.16);
        border-radius: 14px;
        background: var(--panel-strong);
        color: var(--text);
        font: inherit;
      }

      .field button {
        cursor: pointer;
        background:
          linear-gradient(135deg, rgba(47, 192, 255, 0.18), rgba(0, 152, 255, 0.08)),
          var(--panel-strong);
      }

      .field button:hover {
        border-color: rgba(47, 192, 255, 0.4);
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 16px;
        margin-bottom: 18px;
      }

      .section-title {
        margin: 0;
        font-size: 24px;
      }

      .section-desc {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .section-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: #cde9ff;
        font-size: 12px;
        white-space: nowrap;
      }

      .section-tools {
        display: grid;
        gap: 12px;
        margin-bottom: 18px;
      }

      .inline-search input {
        width: 100%;
        min-height: 44px;
        padding: 0 14px;
        border: 1px solid rgba(137, 186, 220, 0.16);
        border-radius: 14px;
        background: var(--panel-strong);
        color: var(--text);
        font: inherit;
      }

      .tool-status {
        min-height: 18px;
        color: var(--muted);
        font-size: 12px;
      }

      .tool-status.danger {
        color: var(--danger);
      }

      .filter-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .filter-btn {
        padding: 10px 14px;
        border: 1px solid rgba(137, 186, 220, 0.14);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        cursor: pointer;
        font: inherit;
      }

      .filter-btn.active {
        border-color: rgba(47, 192, 255, 0.3);
        background: rgba(47, 192, 255, 0.12);
        color: var(--text);
      }

      .empty {
        padding: 30px 22px;
        border: 1px dashed rgba(137, 186, 220, 0.2);
        border-radius: 18px;
        color: var(--muted);
        text-align: center;
      }

      .data-panel {
        display: none;
      }

      .data-panel.active {
        display: block;
      }

      .schedule-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .match-card {
        padding: 18px;
        border: 1px solid rgba(137, 186, 220, 0.14);
        border-radius: 20px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02)),
          var(--panel-strong);
      }

      .match-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .match-top h3 {
        margin: 0;
        font-size: 18px;
      }

      .match-top p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .status-chip {
        align-self: flex-start;
        padding: 7px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .status-chip.waiting {
        background: rgba(255, 213, 106, 0.12);
        color: var(--warning);
      }

      .status-chip.live {
        background: rgba(47, 192, 255, 0.14);
        color: var(--accent);
      }

      .status-chip.done {
        background: rgba(81, 223, 138, 0.12);
        color: var(--success);
      }

      .status-chip.pending,
      .status-chip.other {
        background: rgba(255, 109, 120, 0.12);
        color: var(--danger);
      }

      .teams {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 12px;
        align-items: stretch;
      }

      .team-box {
        display: flex;
        gap: 12px;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid rgba(137, 186, 220, 0.1);
        background: rgba(255, 255, 255, 0.03);
        min-width: 0;
      }

      .team-box.red {
        box-shadow: inset 0 0 0 1px rgba(255, 109, 120, 0.12);
      }

      .team-box.blue {
        box-shadow: inset 0 0 0 1px rgba(47, 192, 255, 0.12);
      }

      .team-box img {
        width: 52px;
        height: 52px;
        object-fit: cover;
        border-radius: 50%;
        background: #fff;
        flex-shrink: 0;
      }

      .team-meta {
        min-width: 0;
      }

      .team-meta .school {
        display: block;
        font-size: 14px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .team-meta .team {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .score-box {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-width: 92px;
        padding: 10px 0;
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(47, 192, 255, 0.06), rgba(0, 0, 0, 0.08));
      }

      .score-box .score {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.05em;
      }

      .score-box .time {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .group-list {
        display: grid;
        gap: 16px;
      }

      .group-card {
        padding: 16px;
        border: 1px solid rgba(137, 186, 220, 0.14);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.03);
      }

      .group-card h3 {
        margin: 0 0 14px;
        font-size: 18px;
      }

      .table-wrap {
        overflow-x: auto;
        border-radius: 16px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 820px;
      }

      thead th {
        padding: 14px 12px;
        border-bottom: 1px solid rgba(137, 186, 220, 0.16);
        color: #cce8ff;
        text-align: left;
        font-size: 13px;
        background: rgba(255, 255, 255, 0.03);
      }

      tbody td {
        padding: 14px 12px;
        border-bottom: 1px solid rgba(137, 186, 220, 0.08);
        vertical-align: middle;
        font-size: 14px;
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .rank-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 34px;
        height: 34px;
        border-radius: 10px;
        background: rgba(47, 192, 255, 0.12);
        color: var(--accent);
        font-weight: 700;
      }

      .team-cell {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 220px;
      }

      .team-cell img {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        object-fit: cover;
        background: #fff;
        flex-shrink: 0;
      }

      .team-cell .school {
        display: block;
        font-weight: 700;
      }

      .team-cell .team {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      .robot-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
      }

      .tab-btn {
        padding: 10px 14px;
        border: 1px solid rgba(137, 186, 220, 0.14);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        cursor: pointer;
        font: inherit;
      }

      .tab-btn.active {
        border-color: rgba(47, 192, 255, 0.3);
        background: rgba(47, 192, 255, 0.12);
        color: var(--text);
      }

      .robot-note {
        margin-top: 14px;
        color: var(--muted);
        font-size: 13px;
      }

      .school-board {
        display: grid;
        grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
        gap: 18px;
      }

      .school-list {
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .school-list-items {
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .school-search {
        display: grid;
        gap: 10px;
      }

      .school-search input {
        width: 100%;
        min-height: 44px;
        padding: 0 14px;
        border: 1px solid rgba(137, 186, 220, 0.16);
        border-radius: 14px;
        background: var(--panel-strong);
        color: var(--text);
        font: inherit;
      }

      .school-search-status {
        min-height: 18px;
        color: var(--muted);
        font-size: 12px;
      }

      .school-search-status.danger {
        color: var(--danger);
      }

      .school-entry {
        width: 100%;
        padding: 14px;
        border: 1px solid rgba(137, 186, 220, 0.14);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .school-entry.active {
        border-color: rgba(47, 192, 255, 0.3);
        background: rgba(47, 192, 255, 0.1);
      }

      .school-entry-top {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .school-entry-top img,
      .school-detail-head img {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        object-fit: cover;
        background: #fff;
        flex-shrink: 0;
      }

      .school-entry strong,
      .school-detail-head strong {
        display: block;
        font-size: 15px;
      }

      .school-entry span,
      .school-detail-head span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      .school-entry-zones {
        margin-top: 12px;
        color: #cde9ff;
        font-size: 12px;
      }

      .school-detail {
        min-height: 320px;
        padding: 18px;
        border: 1px solid rgba(137, 186, 220, 0.14);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.03);
      }

      .school-detail-head {
        display: flex;
        gap: 14px;
        align-items: center;
        margin-bottom: 18px;
      }

      .school-detail-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }

      .school-meta-chip {
        display: inline-flex;
        align-items: center;
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: #cde9ff;
        font-size: 12px;
      }

      .school-slot-grid {
        display: grid;
        gap: 14px;
      }

      .school-slot-card {
        padding: 16px;
        border: 1px solid rgba(137, 186, 220, 0.12);
        border-radius: 18px;
        background: rgba(8, 19, 30, 0.42);
      }

      .school-slot-title {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }

      .school-slot-title strong {
        font-size: 15px;
      }

      .school-slot-status {
        color: var(--muted);
        font-size: 13px;
      }

      .school-slot-summary {
        margin-top: 10px;
        color: #cde9ff;
        line-height: 1.6;
        font-size: 13px;
      }

      .school-slot-field {
        margin-top: 12px;
      }

      .school-slot-field label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .school-slot-field input {
        width: 100%;
        min-height: 44px;
        padding: 0 14px;
        border: 1px solid rgba(137, 186, 220, 0.16);
        border-radius: 14px;
        background: var(--panel-strong);
        color: var(--text);
        font: inherit;
      }

      .school-slot-field textarea {
        width: 100%;
        min-height: 110px;
        padding: 12px 14px;
        border: 1px solid rgba(137, 186, 220, 0.16);
        border-radius: 14px;
        background: var(--panel-strong);
        color: var(--text);
        font: inherit;
        resize: vertical;
      }

      .school-note-images {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .school-image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
        gap: 10px;
      }

      .school-image-card {
        position: relative;
        overflow: hidden;
        aspect-ratio: 1;
        border: 1px solid rgba(137, 186, 220, 0.14);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
      }

      .school-image-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .school-image-remove {
        position: absolute;
        top: 8px;
        right: 8px;
        min-width: 28px;
        height: 28px;
        border: 0;
        border-radius: 999px;
        background: rgba(7, 18, 29, 0.88);
        color: var(--text);
        cursor: pointer;
        font: inherit;
      }

      .school-image-empty {
        color: var(--muted);
        font-size: 12px;
      }

      .school-image-picker {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        width: fit-content;
        padding: 0 14px;
        border: 1px dashed rgba(137, 186, 220, 0.28);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        color: #cde9ff;
        cursor: pointer;
        font-size: 13px;
      }

      .school-image-picker input {
        display: none;
      }

      .school-image-hint {
        color: var(--muted);
        font-size: 12px;
      }

      .school-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        margin-top: 18px;
      }

      .school-actions button {
        min-height: 44px;
        padding: 0 18px;
        border: 1px solid rgba(137, 186, 220, 0.16);
        border-radius: 14px;
        background:
          linear-gradient(135deg, rgba(47, 192, 255, 0.18), rgba(0, 152, 255, 0.08)),
          var(--panel-strong);
        color: var(--text);
        cursor: pointer;
        font: inherit;
      }

      .school-save-status {
        color: var(--muted);
        font-size: 13px;
      }

      .school-save-status.success {
        color: var(--success);
      }

      .school-save-status.danger {
        color: var(--danger);
      }

      .footer-note {
        margin-top: 18px;
        padding: 18px 20px;
        border: 1px solid rgba(137, 186, 220, 0.14);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }

      @media (max-width: 1080px) {
        .status-bar,
        .controls,
        .schedule-grid {
          grid-template-columns: 1fr;
        }

        .school-board {
          grid-template-columns: 1fr;
        }

        .panel-selector {
          flex-direction: column;
          align-items: flex-start;
        }

        .section-header {
          flex-direction: column;
          align-items: flex-start;
        }
      }

      @media (max-width: 760px) {
        .page {
          width: min(100% - 20px, 1400px);
          margin-top: 14px;
        }

        .hero,
        .controls,
        .section {
          padding: 18px;
          border-radius: 20px;
        }

        .teams {
          grid-template-columns: 1fr;
        }

        .score-box {
          min-width: 0;
          flex-direction: row;
          gap: 12px;
          justify-content: space-between;
          padding: 12px 14px;
        }

        .score-box .time {
          margin-top: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="eyebrow">RoboMaster Live Observer</div>
        <center><h1>工作台</h1></center>
        <div class="status-bar">
          <div class="metric-card">
            <span class="label">抓取策略</span>
            <span class="value">官方 JSON 直连</span>
          </div>
          <div class="metric-card">
            <span class="label">当前状态</span>
            <span class="value" id="health-value">等待首次拉取</span>
          </div>
          <div class="metric-card">
