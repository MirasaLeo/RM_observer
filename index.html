      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatDateTime(iso) {
        if (!iso) {
          return "-";
        }
        return new Intl.DateTimeFormat("zh-CN", {
          timeZone: state.timezone,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        }).format(new Date(iso));
      }

      function formatShortTime(iso) {
        if (!iso) {
          return "-";
        }
        return new Intl.DateTimeFormat("zh-CN", {
          timeZone: state.timezone,
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }).format(new Date(iso));
      }

      function formatNumber(value, options = {}) {
        if (value === null || value === undefined || value === "") {
          return "-";
        }
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) {
          return escapeHtml(value);
        }

        let digits = 0;
        if (options.percent) {
          digits = numeric % 1 === 0 ? 0 : 1;
          return numeric.toFixed(digits) + "%";
        }

        digits = Number.isInteger(numeric) ? 0 : 1;
        return new Intl.NumberFormat("zh-CN", {
          minimumFractionDigits: digits,
          maximumFractionDigits: digits
        }).format(numeric);
      }

      function getZoneOptions() {
        const zones = new Map();

        const scheduleZones =
          (((state.payloads.schedule || {}).data || {}).event || {}).zones || {};
        for (const zone of scheduleZones.nodes || []) {
          zones.set(zone.id, zone.name);
        }

        for (const zone of (state.payloads.ranking || {}).zones || []) {
          zones.set(zone.zoneId, zone.zoneName);
        }

        for (const zone of (state.payloads.robot || {}).zones || []) {
          zones.set(zone.zoneId, zone.zoneName);
        }

        return [...zones.entries()].map(([id, name]) => ({ id, name }));
      }

      function rebuildZoneSelect() {
        const options = getZoneOptions();
        refs.zoneSelect.innerHTML = [
          '<option value="">全部赛区</option>',
          ...options.map(
            (zone) =>
              `<option value="${escapeHtml(zone.id)}"${zone.id === state.zoneId ? " selected" : ""}>${escapeHtml(zone.name)}</option>`
          )
        ].join("");
        refs.zoneCount.textContent = String(options.length);
      }

      function renderActivePanel() {
        refs.panelTabs.querySelectorAll("[data-panel]").forEach((button) => {
          const isActive = button.dataset.panel === state.activePanel;
          button.classList.toggle("active", isActive);
          button.setAttribute("aria-pressed", isActive ? "true" : "false");
        });

        refs.panelContents.forEach((panel) => {
          panel.classList.toggle("active", panel.dataset.panelContent === state.activePanel);
        });
      }

      function normalizeSchoolIdentity(value) {
        return String(value ?? "")
          .trim()
          .replace(/\s+/g, " ")
          .toLowerCase();
      }

      function buildSchoolKey(info) {
        const collegeName = normalizeSchoolIdentity(info.collegeName);
        const teamName = normalizeSchoolIdentity(info.teamName || info.name);
        const rawId = normalizeSchoolIdentity(info.teamId || info.id);
        if (collegeName) {
          return collegeName;
        }
        if (teamName) {
          return teamName;
        }
        return rawId || "unknown-school";
      }

      function makeSafeDomId(value) {
        return String(value ?? "")
          .trim()
          .replace(/[^a-zA-Z0-9_-]+/g, "-");
      }

      function resolveRemoteUrl(url) {
        const target = String(url || defaultLogo).trim() || defaultLogo;
        if (target.startsWith("//")) {
          return "https:" + target;
        }
        if (target.startsWith("/")) {
          try {
            return new URL(target, defaultLogo).href;
          } catch {
            return defaultLogo;
          }
        }
        return target;
      }

      function resolveAssetUrl(path) {
        const target = String(path || "").trim();
        if (!target) {
          return "";
        }
        if (/^(?:[a-z]+:)?\/\//i.test(target) || target.startsWith("data:")) {
          return target;
        }
        const normalized = target.startsWith("/") ? target.slice(1) : target;
        return new URL(normalized, document.baseURI).href;
      }

      function resolveLogoUrl(url) {
        const target = resolveRemoteUrl(url);
        if (state.staticMode) {
          return target;
        }
        return `${LOGO_PROXY_API}${encodeURIComponent(target)}`;
      }

      function renderLogoImg(url, alt = "", options = {}) {
        const loading = options.loading || "lazy";
        const fallbackUrl = resolveLogoUrl(defaultLogo);
        return `
          <img
            src="${escapeHtml(resolveLogoUrl(url))}"
            alt="${escapeHtml(alt)}"
            loading="${escapeHtml(loading)}"
            decoding="async"
            referrerpolicy="no-referrer"
            onerror="this.onerror=null;this.src='${escapeHtml(fallbackUrl)}';"
          />
        `;
      }

      function upsertSchool(map, info, zoneInfo = {}, robots = []) {
        const key = buildSchoolKey(info);
        let school = map.get(key);

        if (!school) {
          school = {
            key,
            collegeName: info.collegeName || "未知学校",
            teamName: info.teamName || info.name || "-",
            collegeLogo: info.collegeLogo || defaultLogo,
            teamId: info.teamId || info.id || "",
            zoneIds: new Set(),
            zoneNames: new Set(),
            robots: []
          };
          map.set(key, school);
        }

        if (school.collegeName === "未知学校" && info.collegeName) {
          school.collegeName = info.collegeName;
        }
        if (school.teamName === "-" && (info.teamName || info.name)) {
          school.teamName = info.teamName || info.name;
        }
        if ((!school.collegeLogo || school.collegeLogo === defaultLogo) && info.collegeLogo) {
          school.collegeLogo = info.collegeLogo;
        }
        school.teamId = school.teamId || info.teamId || info.id || "";

        if (zoneInfo.id !== null && zoneInfo.id !== undefined && zoneInfo.id !== "") {
          school.zoneIds.add(String(zoneInfo.id));
        }
        if (zoneInfo.name) {
          school.zoneNames.add(zoneInfo.name);
        }

        for (const robot of robots || []) {
          school.robots.push({ ...robot });
        }

        return school;
      }

      function dedupeSchoolRobots(robots) {
        const seen = new Set();
        const deduped = [];

        for (const robot of robots || []) {
          const key = [robot.id ?? "", robot.type ?? "", robot.robotNumber ?? ""].join("__");
          if (seen.has(key)) {
            continue;
          }
          seen.add(key);
          deduped.push(robot);
        }

        return deduped;
      }

      function normalizeSchools() {
        const schools = new Map();
        const scheduleZones = ((((state.payloads.schedule || {}).data || {}).event || {}).zones || {}).nodes || [];

        for (const zone of scheduleZones) {
          if (state.zoneId && zone.id !== state.zoneId) {
            continue;
          }

          const matches = [
            ...((zone.groupMatches || {}).nodes || []),
            ...((zone.knockoutMatches || {}).nodes || [])
          ];

          for (const match of matches) {
            const teams = [
              (((match.redSide || {}).player || {}).team || null),
              (((match.blueSide || {}).player || {}).team || null)
            ];

            for (const team of teams) {
              if (!team || (!team.collegeName && !team.name)) {
                continue;
              }
              upsertSchool(schools, {
                collegeName: team.collegeName,
                teamName: team.name,
                collegeLogo: team.collegeLogo,
                teamId: team.id
              }, {
                id: zone.id,
                name: zone.name
              });
            }
          }
        }

        for (const zone of (state.payloads.ranking || {}).zones || []) {
          if (state.zoneId && zone.zoneId !== state.zoneId) {
            continue;
          }

          for (const group of zone.groups || []) {
            for (const row of group.groupPlayers || []) {
              const info = row[1]?.itemValue;
              if (!info || typeof info !== "object") {
                continue;
              }
              upsertSchool(schools, {
                collegeName: info.collegeName,
                teamName: info.teamName,
                collegeLogo: info.collegeLogo
              }, {
                id: zone.zoneId,
                name: zone.zoneName
              });
            }
          }
        }

        for (const zone of (state.payloads.robot || {}).zones || []) {
          if (state.zoneId && zone.zoneId !== state.zoneId) {
            continue;
          }

          for (const team of zone.teams || []) {
            upsertSchool(schools, {
              collegeName: team.collegeName,
              teamName: team.name,
              collegeLogo: team.collegeLogo,
              teamId: team.id
            }, {
              id: zone.zoneId,
              name: zone.zoneName
            }, team.robots || []);
          }
        }

        return [...schools.values()]
          .map((school) => ({
            ...school,
            zoneIds: [...school.zoneIds],
            zoneNames: [...school.zoneNames].sort((left, right) => left.localeCompare(right, "zh-CN")),
            robots: dedupeSchoolRobots(school.robots)
          }))
          .sort((left, right) => {
            const zoneCompare = (left.zoneNames[0] || "").localeCompare(right.zoneNames[0] || "", "zh-CN");
            if (zoneCompare) {
              return zoneCompare;
            }
            const collegeCompare = left.collegeName.localeCompare(right.collegeName, "zh-CN");
            if (collegeCompare) {
              return collegeCompare;
            }
            return left.teamName.localeCompare(right.teamName, "zh-CN");
          });
      }

      function extractRobotNumber(value) {
        if (value === null || value === undefined || value === "") {
          return null;
        }
        if (typeof value === "number" && Number.isFinite(value)) {
          return value;
        }

        const matched = String(value).match(/\d+/);
        return matched ? Number(matched[0]) : null;
      }

      function findSchoolRobot(robots, slot) {
        return (robots || []).find((robot) => {
          if (robot.type !== slot.type) {
            return false;
          }
          if (slot.robotNumber === undefined) {
            return true;
          }

          const robotNumber = extractRobotNumber(robot.robotNumber);
          if (robotNumber !== null) {
            return robotNumber === slot.robotNumber;
          }

          return String(robot.robotNumber ?? "").trim() === String(slot.robotNumber);
        }) || null;
      }

      function renderSchoolRobotSummary(robot, slot) {
        if (!robot) {
          return "当前暂无该机器人官方数据。";
        }

        const config = ROBOT_CONFIG[slot.type];
        if (!config) {
          return `官方编号：${escapeHtml(robot.robotNumber ?? "-")}`;
        }

        return config.columns
          .map((column) => `${escapeHtml(column.label)}：${formatNumber(robot[column.key], column)}`)
          .join(" · ");
      }

      function getSchoolNotesByKey(schoolKey) {
        const notes = state.schoolNotes[schoolKey];
        return notes && typeof notes === "object" ? notes : {};
      }

      function getSchoolImagesByKey(schoolKey) {
        const images = state.schoolImages[schoolKey];
        return images && typeof images === "object" ? images : {};
      }

      function getSchoolSlotImages(schoolKey, slotId) {
        const images = getSchoolImagesByKey(schoolKey)[slotId];
        return Array.isArray(images) ? images : [];
      }

      function setSchoolSlotImages(schoolKey, slotId, imagePaths) {
        if (!state.schoolImages[schoolKey] || typeof state.schoolImages[schoolKey] !== "object") {
          state.schoolImages[schoolKey] = {};
        }
        const deduped = [];
        for (const imagePath of imagePaths || []) {
          const text = String(imagePath || "").trim();
          if (!text || deduped.includes(text)) {
            continue;
          }
          deduped.push(text);
        }
        if (deduped.length || state.staticMode) {
          state.schoolImages[schoolKey][slotId] = deduped;
        } else {
          delete state.schoolImages[schoolKey][slotId];
        }
      }

      function normalizeStoredImageUrl(imagePath) {
        const text = String(imagePath || "").trim();
        if (!text) {
          return "";
        }
        if (text.startsWith("idb:")) {
          return state.browserImageDataUrls[text.slice(4)] || "";
        }
        return resolveAssetUrl(text);
      }

      function makeUploadSlotToken(schoolKey, slotId) {
        return `${schoolKey}::${slotId}`;
      }

      function readStorageJson(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) {
            return fallback;
          }
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : fallback;
        } catch {
          return fallback;
        }
      }

      function writeStorageJson(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function mergeNestedMaps(baseValue, overrideValue) {
        const result = {};

        for (const [schoolKey, slots] of Object.entries(baseValue || {})) {
          if (!slots || typeof slots !== "object") {
            continue;
          }
          result[schoolKey] = Array.isArray(slots) ? [...slots] : { ...slots };
        }

        for (const [schoolKey, slots] of Object.entries(overrideValue || {})) {
          if (!slots || typeof slots !== "object") {
            continue;
          }
          if (!result[schoolKey] || typeof result[schoolKey] !== "object") {
            result[schoolKey] = {};
          }
          for (const [slotId, slotValue] of Object.entries(slots)) {
            result[schoolKey][slotId] = Array.isArray(slotValue) ? [...slotValue] : slotValue;
          }
        }

        return result;
      }

      function openBrowserImageDb() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(BROWSER_IDB_NAME, 1);
          request.onerror = () => reject(request.error || new Error("failed to open IndexedDB"));
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(BROWSER_IDB_STORE)) {
              db.createObjectStore(BROWSER_IDB_STORE);
            }
          };
          request.onsuccess = () => resolve(request.result);
        });
      }

      async function withBrowserImageStore(mode, handler) {
        const db = await openBrowserImageDb();
        try {
          return await new Promise((resolve, reject) => {
            const transaction = db.transaction(BROWSER_IDB_STORE, mode);
            const store = transaction.objectStore(BROWSER_IDB_STORE);
            Promise.resolve(handler(store, resolve, reject)).catch(reject);
            transaction.onerror = () => reject(transaction.error || new Error("IndexedDB transaction failed"));
          });
        } finally {
          db.close();
        }
      }

      async function idbPutImage(imageId, dataUrl) {
        await withBrowserImageStore("readwrite", (store, resolve, reject) => {
          const request = store.put(dataUrl, imageId);
          request.onerror = () => reject(request.error || new Error("failed to write image"));
          request.onsuccess = () => resolve(undefined);
        });
      }

      async function idbGetImage(imageId) {
        return withBrowserImageStore("readonly", (store, resolve, reject) => {
          const request = store.get(imageId);
          request.onerror = () => reject(request.error || new Error("failed to read image"));
          request.onsuccess = () => resolve(typeof request.result === "string" ? request.result : "");
        });
      }

      async function idbDeleteImage(imageId) {
        await withBrowserImageStore("readwrite", (store, resolve, reject) => {
          const request = store.delete(imageId);
          request.onerror = () => reject(request.error || new Error("failed to delete image"));
          request.onsuccess = () => resolve(undefined);
        });
      }

      async function hydrateBrowserImageDataUrls() {
        const refs = new Set();
        for (const slotMap of Object.values(state.schoolImages || {})) {
          if (!slotMap || typeof slotMap !== "object") {
            continue;
          }
          for (const imagePaths of Object.values(slotMap)) {
            if (!Array.isArray(imagePaths)) {
              continue;
            }
            for (const imageRef of imagePaths) {
              const text = String(imageRef || "").trim();
              if (text.startsWith("idb:")) {
                refs.add(text.slice(4));
              }
            }
          }
        }

        for (const imageId of refs) {
          if (state.browserImageDataUrls[imageId]) {
            continue;
          }
          try {
            const dataUrl = await idbGetImage(imageId);
            if (dataUrl) {
              state.browserImageDataUrls[imageId] = dataUrl;
            }
          } catch {
            continue;
          }
        }
      }

      function makeBrowserImageId(schoolKey, slotId) {
        const token =
          typeof crypto !== "undefined" && crypto.randomUUID
            ? crypto.randomUUID()
            : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        return `${makeSafeDomId(schoolKey)}-${makeSafeDomId(slotId)}-${token}`;
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(reader.error || new Error("failed to read file"));
          reader.readAsDataURL(file);
        });
      }

      async function uploadNoteImages(schoolKey, slotId, files) {
        if (!schoolKey || !slotId || !files.length) {
          return;
        }

        const token = makeUploadSlotToken(schoolKey, slotId);
        state.uploadingSlotKeys.add(token);
        setSchoolSaveStatus(schoolKey, "图片上传中...", "muted");
        renderSchoolBoard();

        try {
          const nextImages = [...getSchoolSlotImages(schoolKey, slotId)];
          for (const file of files) {
            if (!file.type.startsWith("image/")) {
              throw new Error(`文件 ${file.name} 不是图片`);
            }
            const dataUrl = await fileToDataUrl(file);
            if (state.staticMode) {
              const imageId = makeBrowserImageId(schoolKey, slotId);
              await idbPutImage(imageId, dataUrl);
              state.browserImageDataUrls[imageId] = dataUrl;
              nextImages.push(`idb:${imageId}`);
            } else {
              const response = await fetch(NOTE_IMAGE_UPLOAD_API, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  schoolKey,
                  slotId,
                  filename: file.name,
                  dataUrl
                })
              });
              const payload = await response.json().catch(() => ({}));
              if (!response.ok) {
                throw new Error(payload.error || `${response.status} ${response.statusText}`);
              }
              if (payload.imagePath) {
                nextImages.push(payload.imagePath);
              }
            }
          }

          setSchoolSlotImages(schoolKey, slotId, nextImages);
          state.dirtySchoolKeys.add(schoolKey);
          setSchoolSaveStatus(schoolKey, `图片已上传，等待自动保存（${SCHOOL_AUTO_SAVE_MS / 1000} 秒）。`);
        } catch (error) {
          setSchoolSaveStatus(schoolKey, `图片上传失败：${error.message}`, "danger");
        } finally {
          state.uploadingSlotKeys.delete(token);
          renderSchoolBoard();
        }
      }

      function renderNoteImages(schoolKey, slotId, fieldLabel) {
        const imagePaths = getSchoolSlotImages(schoolKey, slotId);
        const token = makeUploadSlotToken(schoolKey, slotId);
        const isUploading = state.uploadingSlotKeys.has(token);

        return `
          <div class="school-note-images">
            <div class="school-image-grid">
              ${imagePaths.length
                ? imagePaths
                    .map(
                      (imagePath, index) => `
                        <div class="school-image-card">
                          <img
                            src="${escapeHtml(normalizeStoredImageUrl(imagePath))}"
                            alt="${escapeHtml(fieldLabel)} 图片 ${index + 1}"
                            loading="lazy"
                            decoding="async"
                          />
                          <button
                            class="school-image-remove"
                            type="button"
                            title="移除图片"
                            data-school-image-remove="true"
                            data-school-note-key="${escapeHtml(schoolKey)}"
                            data-school-slot="${escapeHtml(slotId)}"
                            data-image-index="${index}"
                          >
                            ×
                          </button>
                        </div>
                      `
                    )
                    .join("")
                : '<div class="school-image-empty">暂未附图</div>'}
            </div>
            <label class="school-image-picker">
              <input
                type="file"
                accept="image/*"
                multiple
                data-school-image-upload="true"
                data-school-note-key="${escapeHtml(schoolKey)}"
                data-school-slot="${escapeHtml(slotId)}"
              />
              <span>${isUploading ? "上传中..." : "添加图片"}</span>
            </label>
            <div class="school-image-hint">${state.staticMode ? "图片会保存在当前浏览器的 IndexedDB 中，刷新或重新打开页面后仍可读取。" : "图片会保存到 data/imgs/，并在重启后重新读取。"}</div>
          </div>
        `;
      }

      function getSchoolNoteFieldLabels() {
        return Object.fromEntries(
          [...SCHOOL_ROBOT_SLOTS, SCHOOL_SUMMARY_NOTE].map((item) => [item.id, item.label])
        );
      }

      function findSchoolByKey(schoolKey) {
        return normalizeSchools().find((school) => school.key === schoolKey) || null;
      }

      function getFilteredSchools(schools) {
        const pattern = state.schoolSearchPattern.trim();
        if (!pattern) {
          state.schoolSearchError = "";
          return schools;
        }

        let regex;
        try {
          regex = new RegExp(pattern, "i");
          state.schoolSearchError = "";
        } catch (error) {
          state.schoolSearchError = error.message || "无效正则";
          return schools;
        }

        return schools.filter((school) => {
          const haystack = [
            school.collegeName,
            school.teamName,
            ...(school.zoneNames || [])
          ].join(" ");
          return regex.test(haystack);
        });
      }

      function setSchoolSaveStatus(schoolKey, text, tone = "muted") {
        if (!schoolKey) {
          return;
        }
        state.schoolSaveByKey[schoolKey] = { text, tone };

        if (schoolKey === state.activeSchoolKey) {
          const node = refs.schoolDetail.querySelector(".school-save-status");
          if (node) {
            node.className = `school-save-status${tone === "muted" ? "" : ` ${tone}`}`;
            node.textContent = text;
          }
        }
      }

      async function flushDirtySchoolNotes() {
        const pendingKeys = [...state.dirtySchoolKeys].filter((schoolKey) => !state.savingSchoolKeys.has(schoolKey));
        for (const schoolKey of pendingKeys) {
          await saveSchoolNotes(schoolKey, { auto: true });
        }
      }

      async function loadSchoolNotes() {
        if (state.staticMode) {
          const bootstrapNotes = (STATIC_BOOTSTRAP && STATIC_BOOTSTRAP.notes) || {};
          const bootstrapImages = (STATIC_BOOTSTRAP && STATIC_BOOTSTRAP.images) || {};
          const browserNotes = readStorageJson(BROWSER_NOTES_STORAGE_KEY, {});
          const browserImages = readStorageJson(BROWSER_IMAGES_STORAGE_KEY, {});
          state.schoolNotes = mergeNestedMaps(bootstrapNotes, browserNotes);
          state.schoolImages = mergeNestedMaps(bootstrapImages, browserImages);
          await hydrateBrowserImageDataUrls();
          state.schoolApiStatus = {
            text: "当前为 GitHub Pages 静态快照，备注保存在浏览器 LocalStorage，图片保存在 IndexedDB。",
            tone: "success"
          };
          renderSchoolBoard();
          return;
        }

        try {
          const response = await fetch(SCHOOL_NOTES_API, {
            cache: "no-store"
          });
          if (!response.ok) {
            throw new Error(`${response.status} ${response.statusText}`);
          }

          const payload = await response.json();
          if (payload.notes && typeof payload.notes === "object") {
            state.schoolNotes = payload.notes;
          }
          if (payload.images && typeof payload.images === "object") {
            state.schoolImages = payload.images;
          }
          state.schoolApiStatus = {
            text: payload.csvPath
              ? `已连接本地服务，保存路径：${payload.csvPath}`
              : "已连接本地服务，可以保存到 CSV。",
            tone: "success"
          };
          renderSchoolBoard();
        } catch (error) {
          console.warn("Failed to load school notes", error);
          state.schoolApiStatus = {
            text: "未连接到本地保存服务，请使用 python3 serve_rm_observer.py 打开。",
            tone: "danger"
          };
          renderSchoolBoard();
        }
      }

      async function saveSchoolNotes(schoolKey, options = {}) {
        if (!schoolKey) {
          return;
        }

        if (state.staticMode) {
          try {
            writeStorageJson(BROWSER_NOTES_STORAGE_KEY, state.schoolNotes);
            writeStorageJson(BROWSER_IMAGES_STORAGE_KEY, state.schoolImages);
            state.dirtySchoolKeys.delete(schoolKey);
            state.schoolSaveByKey[schoolKey] = {
              text: options.auto ? "已自动保存到浏览器。" : "已保存到浏览器。",
              tone: "success"
            };
            state.schoolApiStatus = {
              text: "当前为 GitHub Pages 静态快照，备注保存在浏览器 LocalStorage，图片保存在 IndexedDB。",
              tone: "success"
            };
          } catch (error) {
            state.schoolSaveByKey[schoolKey] = {
              text: `${options.auto ? "自动保存失败" : "保存失败"}：${error.message}`,
              tone: "danger"
            };
            state.schoolApiStatus = {
              text: "浏览器本地保存失败，请检查 LocalStorage/IndexedDB 是否可用。",
              tone: "danger"
            };
          }
          return;
        }

        if (state.savingSchoolKeys.has(schoolKey)) {
          return;
        }

        const school = findSchoolByKey(schoolKey);
        if (!school) {
          setSchoolSaveStatus(schoolKey, "保存失败：未找到当前学校数据。", "danger");
          return;
        }

        state.savingSchoolKeys.add(schoolKey);
        setSchoolSaveStatus(schoolKey, options.auto ? "自动保存中..." : "保存中...", "muted");

        try {
          const response = await fetch(SCHOOL_NOTES_API, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              schoolKey: schoolKey,
              collegeName: school.collegeName,
              teamName: school.teamName,
              zoneNames: school.zoneNames || [],
              slotLabels: getSchoolNoteFieldLabels(),
              notes: getSchoolNotesByKey(schoolKey),
              images: getSchoolImagesByKey(schoolKey)
            })
          });

          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(payload.error || `${response.status} ${response.statusText}`);
          }

          state.dirtySchoolKeys.delete(schoolKey);
          state.schoolSaveByKey[schoolKey] = {
            text: payload.csvPath
              ? `${options.auto ? "已自动保存到" : "已保存到"} ${payload.csvPath}`
              : `${options.auto ? "已自动保存到" : "已保存到"} CSV 文件。`,
            tone: "success"
          };
          state.schoolApiStatus = {
            text: payload.csvPath
              ? `已连接本地服务，保存路径：${payload.csvPath}`
              : "已连接本地服务，可以保存到 CSV。",
            tone: "success"
          };
        } catch (error) {
          state.schoolSaveByKey[schoolKey] = {
            text: `${options.auto ? "自动保存失败" : "保存失败"}：${error.message}`,
            tone: "danger"
          };
          state.schoolApiStatus = {
            text: "未连接到本地保存服务，请确认 Python 服务正在运行。",
            tone: "danger"
          };
        } finally {
          state.savingSchoolKeys.delete(schoolKey);
        }
      }

      function deriveMatchTitle(match, groupsById) {
        if (!match) {
          return "未命名比赛";
        }

        if (match.matchType === "KNOCKOUT") {
          const slug = match.slug || "";
          return `${match.orderNumber ? `第${match.orderNumber}场-` : ""}${slug}` || `第${match.orderNumber || "-"}场`;
        }

        if (match.matchType === "GROUP") {
          const groupName = groupsById.get(match.groupId) || "";
          const stage = match.slugName ? `第${match.slugName}轮` : "";
          return `${match.orderNumber ? `第${match.orderNumber}场-` : ""}${groupName ? `${groupName}组` : ""}${stage}` || `第${match.orderNumber || "-"}场`;
        }

        return `第${match.orderNumber || "-"}场`;
      }

      function normalizeMatches() {
        const event = (((state.payloads.schedule || {}).data || {}).event || {});
        const zones = ((event.zones || {}).nodes || []).filter((zone) => !state.zoneId || zone.id === state.zoneId);
        const normalized = [];

        for (const zone of zones) {
          const groupsById = new Map(((zone.groups || {}).nodes || []).map((group) => [group.id, group.name]));
          const matches = [
            ...((zone.groupMatches || {}).nodes || []),
            ...((zone.knockoutMatches || {}).nodes || [])
          ];

          for (const match of matches) {
            const redTeam = (((match.redSide || {}).player || {}).team || {});
            const blueTeam = (((match.blueSide || {}).player || {}).team || {});
            normalized.push({
              id: match.id,
              zoneId: zone.id,
              zoneName: zone.name,
              title: deriveMatchTitle(match, groupsById),
              status: match.status || "UNKNOWN",
              startedAt: match.planStartedAt,
              redScore: match.redSideWinGameCount ?? "-",
              blueScore: match.blueSideWinGameCount ?? "-",
              redTeam,
              blueTeam
            });
          }
        }

        return normalized.sort((left, right) => new Date(left.startedAt) - new Date(right.startedAt));
      }

      function filterScheduleMatches(matches) {
        const pattern = state.scheduleSearchPattern.trim();
        if (!pattern) {
          state.scheduleSearchError = "";
          return matches;
        }

        let regex;
        try {
          regex = new RegExp(pattern, "i");
          state.scheduleSearchError = "";
        } catch (error) {
          state.scheduleSearchError = error.message || "无效正则";
          return matches;
        }

        return matches.filter((match) => {
          const haystack = [
            match.title,
            match.zoneName,
            match.redTeam.collegeName,
            match.redTeam.name,
            match.blueTeam.collegeName,
            match.blueTeam.name
          ].join(" ");
          return regex.test(haystack);
        });
      }

      function renderSchedule() {
        const matches = filterScheduleMatches(normalizeMatches());
        refs.scheduleMeta.textContent = `${matches.length} 场`;
        refs.scheduleSearchInput.value = state.scheduleSearchPattern;
        refs.scheduleSearchStatus.className = `tool-status${state.scheduleSearchError ? " danger" : ""}`;
        refs.scheduleSearchStatus.textContent = state.scheduleSearchError
          ? `正则错误：${state.scheduleSearchError}`
          : state.scheduleSearchPattern.trim()
            ? `正则匹配到 ${matches.length} 场比赛`
            : "支持按比赛标题、学校、战队、赛区进行正则搜索。";

        if (!matches.length) {
          refs.scheduleRoot.innerHTML = '<div class="empty">当前筛选条件下没有赛程数据。</div>';
          return;
        }

        refs.scheduleRoot.innerHTML = matches
          .map((match) => {
            const statusMeta = SCHEDULE_STATUS[match.status] || {
              label: match.status || "未知状态",
              className: "other"
            };

            return `
              <article class="match-card">
                <div class="match-top">
                  <div>
                    <h3>${escapeHtml(match.title)}</h3>
                    <p>${escapeHtml(match.zoneName)} · ${escapeHtml(formatDateTime(match.startedAt))}</p>
                  </div>
                  <span class="status-chip ${escapeHtml(statusMeta.className)}">${escapeHtml(statusMeta.label)}</span>
                </div>
                <div class="teams">
                  <div class="team-box red">
                    ${renderLogoImg(match.redTeam.collegeLogo || defaultLogo, match.redTeam.collegeName || "红方学校", { loading: "lazy" })}
                    <div class="team-meta">
                      <span class="school">${escapeHtml(match.redTeam.collegeName || "待定")}</span>
                      <span class="team">${escapeHtml(match.redTeam.name || "待定")}</span>
                    </div>
                  </div>
                  <div class="score-box">
                    <div class="score">${escapeHtml(match.redScore)} : ${escapeHtml(match.blueScore)}</div>
                    <div class="time">${escapeHtml(formatShortTime(match.startedAt))}</div>
                  </div>
                  <div class="team-box blue">
                    ${renderLogoImg(match.blueTeam.collegeLogo || defaultLogo, match.blueTeam.collegeName || "蓝方学校", { loading: "lazy" })}
                    <div class="team-meta">
                      <span class="school">${escapeHtml(match.blueTeam.collegeName || "待定")}</span>
                      <span class="team">${escapeHtml(match.blueTeam.name || "待定")}</span>
                    </div>
                  </div>
                </div>
              </article>
            `;
          })
          .join("");
      }

      function normalizeRankingZones() {
        return ((state.payloads.ranking || {}).zones || []).filter((zone) => !state.zoneId || zone.zoneId === state.zoneId);
      }

      function getRankingGroupOptions(zones) {
        const groups = new Set();
        for (const zone of zones) {
          for (const group of zone.groups || []) {
            if (group.groupName) {
              groups.add(group.groupName);
            }
          }
        }
        return [...groups].sort((left, right) => left.localeCompare(right, "zh-CN"));
      }

      function renderRankingGroupToolbar(options) {
        if (state.rankingGroupFilter && !options.includes(state.rankingGroupFilter)) {
          state.rankingGroupFilter = "";
        }

        refs.rankingGroupToolbar.innerHTML = [
          `<button class="filter-btn ${state.rankingGroupFilter ? "" : "active"}" type="button" data-ranking-group="">全部分组</button>`,
          ...options.map(
            (groupName) => `
              <button
                class="filter-btn ${groupName === state.rankingGroupFilter ? "active" : ""}"
                type="button"
                data-ranking-group="${escapeHtml(groupName)}"
              >
                ${escapeHtml(groupName)}
              </button>
            `
          )
        ].join("");
      }

      function renderRanking() {
        const zones = normalizeRankingZones();
        const totalGroupCount = zones.reduce((count, zone) => count + (zone.groups || []).length, 0);
        const groupOptions = getRankingGroupOptions(zones);
        renderRankingGroupToolbar(groupOptions);
        let visibleGroupCount = 0;

        if (!zones.length) {
          refs.rankingMeta.textContent = "0 个分组";
          refs.rankingRoot.innerHTML = '<div class="empty">当前筛选条件下没有积分榜数据。</div>';
          return;
        }

        const cards = [];
        for (const zone of zones) {
          for (const group of zone.groups || []) {
            if (state.rankingGroupFilter && group.groupName !== state.rankingGroupFilter) {
              continue;
            }
            visibleGroupCount += 1;
            const rows = group.groupPlayers || [];
            if (!rows.length) {
              cards.push(`
                <article class="group-card">
                  <h3>${escapeHtml(zone.zoneName)} · ${escapeHtml(group.groupName)}</h3>
                  <div class="empty">该分组暂无积分榜数据。</div>
                </article>
              `);
              continue;
            }

            const headers = rows[0].map((cell) => cell.itemName);
            const body = rows
              .map((row) => {
                return `
                  <tr>
                    ${row
                      .map((cell, cellIndex) => {
                        if (cellIndex === 0) {
                          return `<td><span class="rank-badge">${escapeHtml(cell.itemValue)}</span></td>`;
                        }
                        if (cellIndex === 1 && typeof cell.itemValue === "object" && cell.itemValue) {
                          const info = cell.itemValue;
                          return `
                            <td>
                              <div class="team-cell">
                                ${renderLogoImg(info.collegeLogo || defaultLogo, info.collegeName || "学校", { loading: "lazy" })}
                                <div>
                                  <span class="school">${escapeHtml(info.collegeName || "-")}</span>
                                  <span class="team">${escapeHtml(info.teamName || "-")}</span>
                                </div>
                              </div>
                            </td>
                          `;
                        }
                        return `<td>${escapeHtml(cell.itemValue)}</td>`;
                      })
                      .join("")}
                  </tr>
                `;
              })
              .join("");

            cards.push(`
              <article class="group-card">
                <h3>${escapeHtml(zone.zoneName)} · ${escapeHtml(group.groupName)}</h3>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>${headers.map((header) => `<th>${escapeHtml(header)}</th>`).join("")}</tr>
                    </thead>
                    <tbody>${body}</tbody>
                  </table>
                </div>
              </article>
            `);
          }
        }

        refs.rankingMeta.textContent = `${visibleGroupCount} / ${totalGroupCount} 个分组`;

        if (!cards.length) {
          refs.rankingRoot.innerHTML = '<div class="empty">当前分组筛选下没有积分榜数据。</div>';
          return;
        }

        refs.rankingRoot.innerHTML = cards.join("");
      }

      function getActiveRobotConfig() {
        return ROBOT_CONFIG[state.robotType] || ROBOT_CONFIG.Infantry;
      }

      function sortRobotRows(rows, config) {
        rows.sort((left, right) => {
          const direction = config.columns.find((item) => item.key === config.sortKey)?.sortDirection || config.sortDirection;
          const zeroLast = config.columns.find((item) => item.key === config.sortKey)?.zeroLast;
          const leftValue = Number(left[config.sortKey] || 0);
          const rightValue = Number(right[config.sortKey] || 0);

          if (zeroLast) {
            if (leftValue === 0 && rightValue !== 0) {
              return 1;
            }
            if (rightValue === 0 && leftValue !== 0) {
              return -1;
            }
          }

          if (direction === "asc") {
            return leftValue - rightValue || left.id - right.id;
          }
          return rightValue - leftValue || left.id - right.id;
        });
      }

      function normalizeRobotZones() {
        const zones = ((state.payloads.robot || {}).zones || []).filter((item) => !state.zoneId || item.zoneId === state.zoneId);
        const config = getActiveRobotConfig();

        return zones.map((zone) => {
          const rows = [];
          for (const team of zone.teams || []) {
            for (const robot of team.robots || []) {
              if (robot.type !== state.robotType) {
                continue;
              }
              rows.push({
                ...robot,
                collegeInfo: {
                  id: team.id,
                  collegeName: team.collegeName,
                  collegeLogo: team.collegeLogo,
                  teamName: team.name
                }
              });
            }
          }

          sortRobotRows(rows, config);
          return { zone, rows };
        });
      }

      function renderRobotToolbar() {
        refs.robotToolbar.innerHTML = Object.entries(ROBOT_CONFIG)
          .map(
            ([type, config]) => `
              <button
                class="tab-btn ${type === state.robotType ? "active" : ""}"
                type="button"
                data-robot-type="${escapeHtml(type)}"
              >
                ${escapeHtml(config.label)}
              </button>
            `
          )
          .join("");

        refs.robotToolbar.querySelectorAll("[data-robot-type]").forEach((button) => {
          button.addEventListener("click", () => {
            state.robotType = button.dataset.robotType;
            renderRobotToolbar();
            renderRobot();
          });
        });
      }

      function renderRobot() {
        const zoneBundles = normalizeRobotZones();
        const config = getActiveRobotConfig();
        const totalRows = zoneBundles.reduce((count, item) => count + item.rows.length, 0);
        refs.robotMeta.textContent = `${totalRows} 台 ${config.label}`;

        if (!zoneBundles.length) {
          refs.robotRoot.innerHTML = '<div class="empty">当前筛选条件下没有机器人关键数据。</div>';
          return;
        }

        const headers = ["排名", "学校信息", "编号", ...config.columns.map((column) => column.label)];
        refs.robotRoot.innerHTML = zoneBundles
          .map(({ zone, rows }) => {
            if (!rows.length) {
              return `<div class="empty">${escapeHtml(zone.zoneName)} 当前没有 ${escapeHtml(config.label)} 数据。</div>`;
            }

            const body = rows
              .map((row, index) => {
                return `
                  <tr>
                    <td><span class="rank-badge">${index + 1}</span></td>
                    <td>
                      <div class="team-cell">
                        ${renderLogoImg(row.collegeInfo.collegeLogo || defaultLogo, row.collegeInfo.collegeName || "学校", { loading: "lazy" })}
                        <div>
                          <span class="school">${escapeHtml(row.collegeInfo.collegeName || "-")}</span>
                          <span class="team">${escapeHtml(row.collegeInfo.teamName || "-")}</span>
                        </div>
                      </div>
                    </td>
                    <td>${escapeHtml(row.robotNumber ?? "-")}</td>
                    ${config.columns
                      .map((column) => `<td>${formatNumber(row[column.key], column)}</td>`)
                      .join("")}
                  </tr>
                `;
              })
              .join("");

            return `
              <div class="group-card">
                <h3>${escapeHtml(zone.zoneName)} · ${escapeHtml(config.label)}</h3>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>${headers.map((header) => `<th>${escapeHtml(header)}</th>`).join("")}</tr>
                    </thead>
                    <tbody>${body}</tbody>
                  </table>
                </div>
              </div>
            `;
          })
          .join("");
      }

      function renderSchoolBoard() {
        const schools = normalizeSchools();
        const filteredSchools = getFilteredSchools(schools);
        refs.schoolMeta.textContent = `${filteredSchools.length} / ${schools.length} 所学校`;
        refs.schoolSearchInput.value = state.schoolSearchPattern;
        refs.schoolSearchStatus.className = `school-search-status${state.schoolSearchError ? " danger" : ""}`;
        refs.schoolSearchStatus.textContent = state.schoolSearchError
          ? `正则错误：${state.schoolSearchError}`
          : state.schoolSearchPattern.trim()
            ? `正则匹配到 ${filteredSchools.length} 所学校`
            : "支持按学校、战队、赛区进行正则搜索。";

        if (!schools.length) {
          state.activeSchoolKey = "";
          refs.schoolList.innerHTML = '<div class="empty">当前筛选条件下没有学校数据。</div>';
          refs.schoolDetail.innerHTML = '<div class="empty">请选择其他赛区或等待数据刷新。</div>';
          return;
        }

        if (!filteredSchools.length) {
          refs.schoolList.innerHTML = '<div class="empty">当前正则没有匹配到学校。</div>';
          refs.schoolDetail.innerHTML = '<div class="empty">请调整搜索表达式后再查看学校详情。</div>';
          return;
        }

        if (!filteredSchools.some((school) => school.key === state.activeSchoolKey)) {
          state.activeSchoolKey = filteredSchools[0].key;
        }

        refs.schoolList.innerHTML = filteredSchools
          .map((school) => {
            return `
              <button
                class="school-entry ${school.key === state.activeSchoolKey ? "active" : ""}"
                type="button"
                data-school-entry="${escapeHtml(school.key)}"
              >
                <div class="school-entry-top">
                  ${renderLogoImg(school.collegeLogo || defaultLogo, school.collegeName || "学校", { loading: "lazy" })}
                  <div>
                    <strong>${escapeHtml(school.collegeName || "未知学校")}</strong>
                    <span>${escapeHtml(school.teamName || "-")}</span>
                  </div>
                </div>
                <div class="school-entry-zones">${escapeHtml((school.zoneNames || []).join(" / ") || "赛区未标记")}</div>
              </button>
            `;
          })
          .join("");

        const activeSchool =
          filteredSchools.find((school) => school.key === state.activeSchoolKey) || filteredSchools[0];
        const notes = getSchoolNotesByKey(activeSchool.key);
        const saveStatus = state.schoolSaveByKey[activeSchool.key] || state.schoolApiStatus;
        const summaryInputId = `school-note-${makeSafeDomId(activeSchool.key)}-${SCHOOL_SUMMARY_NOTE.id}`;

        refs.schoolDetail.innerHTML = `
          <div class="school-detail-head">
            ${renderLogoImg(activeSchool.collegeLogo || defaultLogo, activeSchool.collegeName || "学校", { loading: "eager" })}
            <div>
              <strong>${escapeHtml(activeSchool.collegeName || "未知学校")}</strong>
              <span>${escapeHtml(activeSchool.teamName || "-")}</span>
              <div class="school-detail-meta">
                ${(activeSchool.zoneNames || []).length
                  ? activeSchool.zoneNames.map((name) => `<span class="school-meta-chip">${escapeHtml(name)}</span>`).join("")
                  : '<span class="school-meta-chip">赛区未标记</span>'}
              </div>
            </div>
          </div>
          <div class="school-slot-grid">
            ${SCHOOL_ROBOT_SLOTS.map((slot) => {
              const robot = findSchoolRobot(activeSchool.robots, slot);
              const inputId = `school-note-${makeSafeDomId(activeSchool.key)}-${slot.id}`;
              const summary = renderSchoolRobotSummary(robot, slot);
              const statusText = robot
                ? `官方编号：${escapeHtml(robot.robotNumber ?? slot.robotNumber ?? slot.label)}`
                : "暂无官方数据";

              return `
                <div class="school-slot-card">
                  <div class="school-slot-title">
                    <strong>${escapeHtml(slot.label)}</strong>
                    <span class="school-slot-status">${statusText}</span>
                  </div>
                  <div class="school-slot-summary">${summary}</div>
                  <div class="school-slot-field">
                    <input
                      id="${escapeHtml(inputId)}"
                      type="text"
                      value="${escapeHtml(notes[slot.id] || "")}"
                      placeholder="输入备注后点击保存"
                      data-school-note-key="${escapeHtml(activeSchool.key)}"
                      data-school-slot="${escapeHtml(slot.id)}"
                    />
                  </div>
                  ${renderNoteImages(activeSchool.key, slot.id, slot.label)}
                </div>
              `;
            }).join("")}
            <div class="school-slot-card">
              <div class="school-slot-title">
                <strong>${escapeHtml(SCHOOL_SUMMARY_NOTE.label)}</strong>
                <span class="school-slot-status">补充你对整支队伍的总体判断</span>
              </div>
              <div class="school-slot-summary">这里可以记录阵容状态、战术倾向、稳定性判断或其他总评信息。</div>
              <div class="school-slot-field">
                <label for="${escapeHtml(summaryInputId)}">${escapeHtml(SCHOOL_SUMMARY_NOTE.label)}</label>
                <textarea
                  id="${escapeHtml(summaryInputId)}"
                  placeholder="输入该学校的总体分析"
                  data-school-note-key="${escapeHtml(activeSchool.key)}"
                  data-school-slot="${escapeHtml(SCHOOL_SUMMARY_NOTE.id)}"
                >${escapeHtml(notes[SCHOOL_SUMMARY_NOTE.id] || "")}</textarea>
              </div>
              ${renderNoteImages(activeSchool.key, SCHOOL_SUMMARY_NOTE.id, SCHOOL_SUMMARY_NOTE.label)}
            </div>
          </div>
          <div class="school-actions">
            <button type="button" data-save-school="${escapeHtml(activeSchool.key)}">${state.staticMode ? "保存到浏览器" : "保存修改"}</button>
            <span class="school-save-status${saveStatus.tone === "muted" ? "" : ` ${escapeHtml(saveStatus.tone)}`}">${escapeHtml(saveStatus.text)}</span>
          </div>
        `;
      }

      function renderMeta() {
        refs.updatedAt.textContent = state.lastUpdatedAt || "-";
        refs.healthValue.textContent = state.healthText;
        refs.healthValue.style.color =
          state.healthTone === "success" ? "var(--success)" :
          state.healthTone === "danger" ? "var(--danger)" :
          "var(--text)";
      }

      function renderAll() {
        rebuildZoneSelect();
        renderMeta();
        renderActivePanel();
        renderSchedule();
        renderRanking();
        renderRobotToolbar();
        renderRobot();
        renderSchoolBoard();
      }

      async function fetchJson(url) {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        return response.json();
      }

      async function refreshAll() {
        state.healthText = "抓取中";
        state.healthTone = "muted";
        renderMeta();

        if (state.staticMode && STATIC_BOOTSTRAP && STATIC_BOOTSTRAP.liveData) {
          state.payloads.schedule = STATIC_BOOTSTRAP.liveData.schedule || null;
          state.payloads.ranking = STATIC_BOOTSTRAP.liveData.ranking || null;
          state.payloads.robot = STATIC_BOOTSTRAP.liveData.robot || null;
          state.lastUpdatedAt = formatDateTime(
            (STATIC_BOOTSTRAP.liveData && STATIC_BOOTSTRAP.liveData.fetchedAt) ||
            STATIC_BOOTSTRAP.builtAt ||
            new Date().toISOString()
          );
          state.healthText = "GitHub Pages 静态快照";
          state.healthTone = "success";
          renderAll();
          return;
        }

        try {
          const payload = await fetchJson(LIVE_DATA_API);
          state.payloads.schedule = payload.schedule;
          state.payloads.ranking = payload.ranking;
          state.payloads.robot = payload.robot;
          state.lastUpdatedAt = formatDateTime(payload.fetchedAt || new Date().toISOString());
          state.healthText = "抓取成功";
          state.healthTone = "success";
          renderAll();
        } catch (error) {
          console.error(error);
          state.healthText = `抓取失败：${error.message || "请确认 python3 serve_rm_observer.py 正在运行"}`;
          state.healthTone = "danger";
          renderMeta();
        }
      }

      function restartTimer() {
        if (state.staticMode) {
          if (state.timer) {
            clearInterval(state.timer);
            state.timer = null;
          }
          return;
        }
        if (state.timer) {
          clearInterval(state.timer);
        }
        state.timer = setInterval(refreshAll, state.refreshMs);
      }

      function restartAutoSaveTimer() {
        if (state.autoSaveTimer) {
          clearInterval(state.autoSaveTimer);
        }
        state.autoSaveTimer = setInterval(() => {
          flushDirtySchoolNotes();
        }, SCHOOL_AUTO_SAVE_MS);
      }

      refs.zoneSelect.addEventListener("change", (event) => {
        state.zoneId = event.target.value;
        renderAll();
      });

      refs.refreshSelect.addEventListener("change", (event) => {
        state.refreshMs = Number(event.target.value);
        restartTimer();
      });

      refs.timezoneSelect.addEventListener("change", (event) => {
        state.timezone = event.target.value;
        renderAll();
      });

      refs.scheduleSearchInput.addEventListener("input", (event) => {
        state.scheduleSearchPattern = event.target.value;
        renderSchedule();
      });

      refs.schoolSearchInput.addEventListener("input", (event) => {
        state.schoolSearchPattern = event.target.value;
        renderSchoolBoard();
      });

      refs.rankingGroupToolbar.addEventListener("click", (event) => {
        const button = event.target.closest("[data-ranking-group]");
        if (!button) {
          return;
        }

        state.rankingGroupFilter = button.dataset.rankingGroup;
        renderRanking();
      });

      refs.panelTabs.querySelectorAll("[data-panel]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activePanel = button.dataset.panel;
          renderActivePanel();
        });
      });

      refs.schoolList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-school-entry]");
        if (!button) {
          return;
        }

        state.activeSchoolKey = button.dataset.schoolEntry;
        renderSchoolBoard();
      });

      refs.schoolDetail.addEventListener("input", (event) => {
        const input = event.target.closest("[data-school-slot]");
        if (!input) {
          return;
        }

        const schoolKey = input.dataset.schoolNoteKey;
        const slotId = input.dataset.schoolSlot;
        if (!schoolKey || !slotId) {
          return;
        }

        if (!state.schoolNotes[schoolKey] || typeof state.schoolNotes[schoolKey] !== "object") {
          state.schoolNotes[schoolKey] = {};
        }

        state.schoolNotes[schoolKey][slotId] = input.value;
        state.dirtySchoolKeys.add(schoolKey);
        setSchoolSaveStatus(schoolKey, `已修改，等待自动保存（${SCHOOL_AUTO_SAVE_MS / 1000} 秒）。`);
      });

      refs.schoolDetail.addEventListener("change", async (event) => {
        const input = event.target.closest("[data-school-image-upload]");
        if (!input) {
          return;
        }

        const schoolKey = input.dataset.schoolNoteKey;
        const slotId = input.dataset.schoolSlot;
        const files = [...(input.files || [])];
        input.value = "";
        await uploadNoteImages(schoolKey, slotId, files);
      });

      refs.schoolDetail.addEventListener("click", (event) => {
        const removeButton = event.target.closest("[data-school-image-remove]");
        if (removeButton) {
          const schoolKey = removeButton.dataset.schoolNoteKey;
          const slotId = removeButton.dataset.schoolSlot;
          const imageIndex = Number(removeButton.dataset.imageIndex);
          const currentImages = [...getSchoolSlotImages(schoolKey, slotId)];
          if (Number.isInteger(imageIndex) && imageIndex >= 0 && imageIndex < currentImages.length) {
            const removedImage = currentImages[imageIndex];
            currentImages.splice(imageIndex, 1);
            setSchoolSlotImages(schoolKey, slotId, currentImages);
            if (state.staticMode && String(removedImage || "").startsWith("idb:")) {
              const imageId = String(removedImage).slice(4);
              delete state.browserImageDataUrls[imageId];
              idbDeleteImage(imageId).catch(() => {});
            }
            state.dirtySchoolKeys.add(schoolKey);
            setSchoolSaveStatus(schoolKey, `图片已移除，等待自动保存（${SCHOOL_AUTO_SAVE_MS / 1000} 秒）。`);
            renderSchoolBoard();
          }
          return;
        }

        const button = event.target.closest("[data-save-school]");
        if (!button) {
          return;
        }

        saveSchoolNotes(button.dataset.saveSchool);
      });

      refs.refreshButton.addEventListener("click", () => {
        refreshAll();
      });

      loadSchoolNotes();
      restartTimer();
      restartAutoSaveTimer();
      refreshAll();
    </script>
  </body>
</html>
